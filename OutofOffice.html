
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Out of Office &mdash; Jiwon Noel Jang</title>
  <link href="https://fonts.googleapis.com/css2?family=Homemade+Apple&family=Roboto:wght@700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0A0807;
      --red:#C0281A;
      --red2:#8C1A10;
      --muted:rgba(180,60,30,.45);
      --sans:'Inter',sans-serif;
      --serif:'Cormorant Garamond',Georgia,serif;
      --script:'Homemade Apple',cursive;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    html,body{height:100%;}
    body{background:var(--bg);font-family:var(--sans);overflow-x:hidden;cursor:none;color:rgba(220,200,190,.78);}

    /* grain overlay */
    body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:900;opacity:.5;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.06'/%3E%3C/svg%3E");}

    /* custom cursor */
    .cur{width:6px;height:6px;background:var(--red);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
    .cur-ring{width:24px;height:24px;border:1px solid rgba(192,40,26,.4);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s,opacity .3s;opacity:.5;}
    .cur-ring.on{width:42px;height:42px;opacity:.8;}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:600;padding:28px 48px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,var(--bg) 60%,transparent);}
    .nav-home{font-family:var(--sans);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--red);text-decoration:none;opacity:.7;transition:opacity .2s;}
    .nav-home:hover{opacity:1;}
    .nav-links{display:flex;gap:32px;list-style:none;}
    .nav-links a{font-family:var(--sans);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);text-decoration:none;opacity:.7;transition:opacity .2s;}
    .nav-links a:hover{opacity:1;}

    /* HERO HEADER */
    .project-hero{
      min-height:60vh;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      padding:0 48px 64px;
      position:relative;
    }
    .project-tag{
      font-family:var(--sans);font-size:9px;letter-spacing:.3em;text-transform:uppercase;
      color:var(--muted);margin-bottom:24px;
    }
    .project-title{
      font-family:var(--serif);
      font-size:clamp(36px,6vw,80px);
      font-weight:300;
      font-style:italic;
      color:rgba(220,200,190,.78);
      line-height:1.05;
      margin-bottom:16px;
      opacity:0;
      animation:slideIn .9s cubic-bezier(.16,1,.3,1) .3s forwards;
    }
    .project-subtitle{
      font-family:var(--sans);
      font-size:clamp(12px,1.4vw,16px);
      font-weight:300;
      color:rgba(192,40,26,.5);
      letter-spacing:.04em;
      line-height:1.6;
      max-width:600px;
      opacity:0;
      animation:slideIn .9s cubic-bezier(.16,1,.3,1) .6s forwards;
    }

    @keyframes slideIn{
      from{opacity:0;transform:translateY(32px);}
      to{opacity:1;transform:translateY(0);}
    }

    /* GALLERY */
    .gallery{
      max-width:900px;
      margin:0 auto;
      padding:40px 48px 120px;
    }
    .gallery-slide{
      width:100%;
      margin-bottom:48px;
      opacity:0;
      transform:translateY(60px);
      transition:opacity .8s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1);
    }
    .gallery-slide.visible{
      opacity:1;
      transform:translateY(0);
    }
    .gallery-slide img{
      width:100%;
      height:auto;
      display:block;
      border-radius:4px;
      box-shadow:0 8px 40px rgba(0,0,0,.4);
    }
    .gallery-slide:nth-child(even){
      transition-delay:.1s;
    }

    /* slide number label */
    .slide-num{
      font-family:var(--sans);
      font-size:9px;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:rgba(192,40,26,.3);
      margin-bottom:12px;
      display:block;
    }

    /* FOOTER */
    footer{
      padding:48px;
      border-top:1px solid rgba(192,40,26,.1);
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .footer-name{
      font-family:var(--sans);font-size:11px;letter-spacing:.08em;color:rgba(192,40,26,.4);
    }
    .footer-name a{color:var(--red);text-decoration:none;opacity:.7;transition:opacity .2s;}
    .footer-name a:hover{opacity:1;}
    .footer-back{
      font-family:var(--sans);font-size:11px;letter-spacing:.08em;color:var(--red);text-decoration:none;opacity:.5;transition:opacity .2s;
    }
    .footer-back:hover{opacity:1;}

    /* scroll nudge */
    .scroll-nudge{
      position:absolute;bottom:32px;left:48px;
      display:flex;flex-direction:column;align-items:center;gap:8px;
      opacity:0;animation:fadeIn 1s ease 1.4s forwards;
    }
    .scroll-nudge-line{width:1px;height:40px;background:var(--red);opacity:.3;animation:drip 2s ease-in-out 2s infinite;}
    .scroll-nudge-label{font-family:var(--sans);font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:var(--red);opacity:.4;}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes drip{0%{top:-100%}55%{top:100%}100%{top:100%}}

    @media(max-width:768px){
      nav{padding:20px 24px;}
      .project-hero{padding:0 24px 48px;min-height:50vh;}
      .gallery{padding:24px 24px 80px;}
      .gallery-slide{margin-bottom:32px;}
      footer{padding:32px 24px;flex-direction:column;gap:16px;text-align:center;}
    }
  </style>
</head>
<body>

<div class="cur" id="cur"></div>
<div class="cur-ring" id="curRing"></div>

<nav>
  <a href="index.html" class="nav-home">Home</a>
  <ul class="nav-links">
    <li><a href="Works.html">Works</a></li>
    <li><a href="about_1.html">About</a></li>
    <li><a href="Contact.html">Contact</a></li>
  </ul>
</nav>

<section class="project-hero">
  <span class="project-tag">Brand Activation &mdash; Industry &times; LinkedIn</span>
  <h1 class="project-title">Out of Office</h1>
  <p class="project-subtitle">What if the cast of Industry had LinkedIn accounts?</p>
  <div class="scroll-nudge" aria-hidden="true">
    <div class="scroll-nudge-line"></div>
    <span class="scroll-nudge-label">Scroll</span>
  </div>
</section>

<section class="gallery">
  <div class="gallery-slide">
    <span class="slide-num">01 / 12</span>
    <img src="images//1.png" alt="Out of Office — Slide 1" loading="lazy"/>
  </div>
  <div class="gallery-slide">

  <div class="gallery-slide">

  <div class="gallery-slide">

    <img src="images//4.png" alt="Out of Office — Slide 4" loading="lazy"/>
  </div>
  <div class="gallery-slide">
    <span class="slide-num">05 / 12</span>
    <img src="images//5.png" alt="Out of Office — Slide 5" loading="lazy"/>
  </div>
  <div class="gallery-slide">
    <span class="slide-num">06 / 12</span>
    <img src="images//6.png" alt="Out of Office — Slide 6" loading="lazy"/>
  </div>
  <div class="gallery-slide">

  <div class="gallery-slide">

  <div class="gallery-slide">

  <div class="gallery-slide">

    <img src="images//12.png" alt="Out of Office — Slide 12" loading="lazy"/>

<footer>
  <span class="footer-name">A piece by <a href='/'>Jiwon Noel Jang</a></span>
  <a class='footer-back' href='/'>&larr; Back to portfolio</a>
</footer>

<script>
/* Custom cursor */
const cur=document.getElementById("cur"),ring=document.getElementById("curRing");
let mx=0,my=0,rx=0,ry=0;
document.addEventListener("mousemove",e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+"px";cur.style.top=my+"px";});
(function t(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+"px";ring.style.top=ry+"px";requestAnimationFrame(t);})();
document.querySelectorAll("a").forEach(el=>{
  el.addEventListener("mouseenter",()=>ring.classList.add("on"));
  el.addEventListener("mouseleave",()=>ring.classList.remove("on"));
});

/* Scroll-reveal for gallery slides */
const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("visible");obs.unobserve(e.target);}});
},{threshold:0.12});
document.querySelectorAll(".gallery-slide").forEach(el=>obs.observe(el));

</script>
</body>
</html>
