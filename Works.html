<script>
const cur=document.getElementById("cur"),ring=document.getElementById("curRing");
let mx=0,my=0,rx=0,ry=0;
document.addEventListener("mousemove",e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+"px";cur.style.top=my+"px";});
(function t(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+"px";ring.style.top=ry+"px";requestAnimationFrame(t);})();
document.querySelectorAll("a").forEach(el=>{
  el.addEventListener("mouseenter",()=>ring.classList.add("on"));
  el.addEventListener("mouseleave",()=>ring.classList.remove("on"));
});
</script>
